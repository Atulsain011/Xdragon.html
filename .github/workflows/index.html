body{

align-items:center;
/* Original Background Image */
background: url("https://wallpaperaccess.com/full/3300422.jpg") no-repeat center center/cover;
position:relative;
overflow:hidden;
}

/* Dark Overlay for Game Feel */
body::before{
content:"";
position:absolute;
width:100%;
height:100%;
background: rgba(0, 0, 0, 0.8);
z-index:1;
}

/* Scanline Effect (CRT Screen Look) */
body::after{
content:"";
position:absolute;
width:100%;
height:100%;
background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));

z-index:2;
pointer-events:none;
}

/* Background Animation (Ken Burns Effect) */
@keyframes zoomBg {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
}

body{
    animation: zoomBg 20s infinite alternate;
}

/* Start Overlay */
#startOverlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
z-index:100;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
transition: opacity 1s ease;
}

#startOverlay h1{
    font-family: 'Orbitron', sans-serif;
    color: #ff4d4d;
    font-size: 40px;
    margin-bottom: 20px;
    text-shadow: 0 0 20px #ff0000;
    animation: pulse 1.5s infinite;
}

#startOverlay button{
    padding: 15px 40px;
    font-size: 20px;
    background: #ff4d4d;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-family: 'Orbitron', sans-serif;
    box-shadow: 0 0 20px #ff0000;
    transition: 0.3s;
}

#startOverlay button:hover{
    transform: scale(1.1);
    background: #ff0000;
}

@keyframes pulse {
    0% { opacity: 0.8; }
    50% { opacity: 1; }
    100% { opacity: 0.8; }
}
