<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xdragon - Official Download</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: 'Poppins', sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: linear-gradient(-45deg,#000,#1a1a1a,#ff3c00,#000);
background-size:400% 400%;
animation: bgAnimation 8s infinite alternate;
}

@keyframes bgAnimation{
0%{background-position:left;}
100%{background-position:right;}
}

.card{
width:350px;
padding:35px;
border-radius:20px;
background: rgba(255,255,255,0.08);
backdrop-filter: blur(20px);
box-shadow:0 0 30px rgba(255,60,0,0.8);
text-align:center;
color:white;
transition:0.4s;
}

.card:hover{
transform: scale(1.05);
}

.logo{
width:130px;
border-radius:25px;
margin:20px 0;
box-shadow:0 0 20px orange;
}

h1{
letter-spacing:2px;
}

button{
padding:12px 30px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,orange,red);
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
margin-top:15px;
}

button:hover{
transform: scale(1.1);
}

.progress-container{
width:100%;
height:10px;
background:#222;
border-radius:20px;
margin-top:20px;
overflow:hidden;
display:none;
}

.progress-bar{
height:100%;
width:0%;
background:linear-gradient(90deg,orange,red);
transition:width 0.3s;
}

.status{
margin-top:10px;
font-size:14px;
color:#ffb3b3;
}
</style>
</head>

<body>

<div class="card">
<h1>Xdragon</h1>
<img src="https://upload.wikimedia.org/wikipedia/en/9/9c/Garena_Free_Fire_logo.png" class="logo">

<button onclick="startDownload()">Download Now</button>

<div class="progress-container" id="progressContainer">
<div class="progress-bar" id="progressBar"></div>
</div>

<div class="status" id="statusText"></div>

</div>

<audio id="clickSound">
<source src="https://www.soundjay.com/buttons/sounds/button-29.mp3" type="audio/mpeg">
</audio>

<script>
function startDownload(){
document.getElementById("clickSound").play();

let progressContainer = document.getElementById("progressContainer");
let progressBar = document.getElementById("progressBar");
let statusText = document.getElementById("statusText");

progressContainer.style.display="block";
statusText.innerHTML="Preparing download...";

let width = 0;
let interval = setInterval(function(){
if(width >= 100){
clearInterval(interval);
statusText.innerHTML="Download Starting...";
window.location.href="https://play.google.com/store/apps/details?id=com.dts.freefireth";
}
else{
width++;
progressBar.style.width = width + "%";
}
},30);
}
</script>

</body>
</html>
